name: Demo Reports

on:
  workflow_dispatch:

jobs:
  export-demo-reports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Export demo reports
        run: bash scripts/ci/export-demo-reports.sh

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-forge-demo-reports
          path: reports/
